name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      # Octave for the differential oracle (an arm's-length subprocess only). The tree-sitter
      # runtime + MATLAB grammar come from JLL artifacts (no system libtree-sitter / cc needed).
      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      # Coveralls works tokenless for public repos via the built-in GITHUB_TOKEN — no per-repo
      # secret needed (unlike Codecov, which now rejects tokenless uploads -> "unknown" badge).
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          fail-on-error: false
