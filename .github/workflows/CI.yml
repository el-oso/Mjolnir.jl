name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast per-push gate: the differential oracle runs in Octave (an arm's-length subprocess only).
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} (Octave)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      # tree-sitter runtime + MATLAB grammar come from JLL artifacts (no system libtree-sitter / cc).
      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          fail-on-error: false

  # Real-MATLAB verification: MATLAB harvests all oracle cases in ONE session via
  # matlab-actions/run-command (the only path that auto-licenses MATLAB for free on
  # public repos — no token/secret needed). Julia then compares the results.
  matlab-oracle:
    name: MATLAB differential oracle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          products: MATLAB
      - name: Instantiate Julia project
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Export oracle cases to workdir
        run: julia --project=. dev/oracle_export.jl /tmp/oracle_workdir
      - name: Copy MATLAB harness to workdir
        run: cp matlab/oracle_harness.m /tmp/oracle_workdir/oracle_harness.m
      - name: Run MATLAB oracle harness (token-free via run-command)
        uses: matlab-actions/run-command@v2
        with:
          command: cd('/tmp/oracle_workdir'); oracle_harness
      - name: Compare MATLAB results against Julia (gate)
        run: julia --project=. dev/oracle_compare.jl /tmp/oracle_workdir
