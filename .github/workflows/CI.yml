name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v2
      # Octave for the differential oracle (an arm's-length subprocess only).
      - name: Install Octave
        run: |
          sudo apt-get update
          sudo apt-get install -y octave
      # Build a pinned tree-sitter runtime from source: distro packages lag behind the grammar's
      # ABI (LANGUAGE_VERSION 15 needs tree-sitter >= 0.21; apt ships an older ABI 14 -> mismatch).
      - name: Install tree-sitter runtime (pinned)
        run: |
          git clone --depth 1 --branch v0.25.10 https://github.com/tree-sitter/tree-sitter /tmp/tree-sitter
          make -C /tmp/tree-sitter
          sudo make -C /tmp/tree-sitter install PREFIX=/usr/local
          sudo ldconfig
      - name: Build the MATLAB grammar
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'
          julia --project=. deps/build.jl
      - uses: julia-actions/julia-runtest@v1
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
